{% extends "base.html" %}

{% block title %}เลือกประเภทกับข้าว{% endblock %}

{% block content %}
<section class="card">

    <div class="header">
        <div>
            <p class="eyebrow">เมนูกับข้าว</p>
            <h1>เลือกประเภท</h1>
        </div>
    </div>

    <form class="add-form"
          action="{{ url_for('add_category') }}"
          method="post">

        <input type="text"
               name="name"
               placeholder="เพิ่มประเภท เช่น นึ่ง"
               required>

        <button type="submit">
            + เพิ่มประเภท
        </button>
    </form>

    <div class="list">

        {% for category in categories %}

            <div class="row">

                <div class="top-line">

                    <a class="main-link"
                       href="{{ url_for('category', category_id=category.id) }}">

                        <strong>{{ category.name }}</strong>

                    </a>

                    <div class="actions-inline">

                        <button class="tiny-btn edit"
                                type="button"
                                onclick="toggleEdit('edit-category-{{ category.id }}')">

                            แก้ไข

                        </button>

                        <form action="{{ url_for('delete_category', category_id=category.id) }}"
                              method="post"
                              onsubmit="return confirm('ลบประเภทนี้พร้อมเมนูทั้งหมดใช่ไหม?')">

                            <button class="tiny-btn delete" type="submit">
                                ลบ
                            </button>

                        </form>

                    </div>

                </div>

                <span class="menu-count">
                    {{ category.food_count }} เมนู
                </span>

                <form id="edit-category-{{ category.id }}"
                      class="edit-form"
                      action="{{ url_for('edit_category', category_id=category.id) }}"
                      method="post">

                    <input type="text"
                           name="name"
                           value="{{ category.name }}"
                           required>

                    <button type="submit">
                        บันทึก
                    </button>

                </form>

            </div>

        {% else %}

            <div class="empty">
                ยังไม่มีประเภทเมนู
            </div>

        {% endfor %}

    </div>

</section>
{% endblock %}
