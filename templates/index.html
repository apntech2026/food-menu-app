{% extends "base.html" %}

{% block title %}เลือกประเภทกับข้าว{% endblock %}

{% block content %}
<section class="card">
    <div class="header">
        <div>
            <p class="eyebrow">เมนูกับข้าว</p>
            <h1>เลือกประเภท</h1>
        </div>
    </div>

    <form class="add-form" action="{{ url_for('add_category') }}" method="post">
        <input type="text" name="name" placeholder="เพิ่มประเภท เช่น นึ่ง" required>
        <button type="submit">+ เพิ่มประเภท</button>
    </form>

    <div class="list">
        {% for category in categories %}
            <div class="row">
                <a class="main-link" href="{{ url_for('category', category_id=category.id) }}">
                    <strong>{{ category.name }}</strong>
                    <span>{{ category.foods|length }} เมนู</span>
                </a>

                <div class="actions">
                    <button class="small-btn edit" type="button" onclick="toggleEdit('edit-category-{{ category.id }}')">
                        แก้ไข
                    </button>

                    <form action="{{ url_for('delete_category', category_id=category.id) }}" method="post" onsubmit="return confirm('ลบประเภทนี้พร้อมเมนูทั้งหมดใช่ไหม?')">
                        <button class="small-btn delete" type="submit">ลบ</button>
                    </form>
                </div>

                <form id="edit-category-{{ category.id }}" class="edit-form" action="{{ url_for('edit_category', category_id=category.id) }}" method="post">
                    <input type="text" name="name" value="{{ category.name }}" required>
                    <button type="submit">บันทึก</button>
                </form>
            </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
